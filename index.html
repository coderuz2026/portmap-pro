<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e13">
<title>PortMap Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#0a0e13; --bg2:#0d131b; --surface:#141b25; --surface2:#1a232f;
  --line:#232d3a; --line2:#2c3847;
  --txt:#e6edf3; --muted:#8b97a7; --muted2:#5f6b7a;
  --brand:#f5a623; --brand-dim:#3a2e16;
  --up:#3fb950; --reserved:#4493f8; --fault:#f85149; --free:#39424f;
  --r:14px; --rs:10px;
}
body.light{
  --bg:#eef1f5; --bg2:#ffffff; --surface:#ffffff; --surface2:#f1f4f8;
  --line:#e2e6ec; --line2:#cfd6e0;
  --txt:#141a22; --muted:#5f6b7a; --muted2:#98a3b2;
  --brand:#e0900f; --brand-dim:#fbeccb;
}
body.light .topbar{background:rgba(255,255,255,.9)}
body.light .sheet-bg{background:rgba(30,40,55,.4)}
body.light .fab{box-shadow:0 8px 24px rgba(224,144,15,.35)}
body.light .stat .n,body.light .dev .nm{color:var(--txt)}
body.light .port{background:#0d1118}
body.light .empty .em,body.light .auth .mark{background:#f1f4f8}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}

/* ---- auth ---- */
.auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding:34px 26px calc(34px + env(safe-area-inset-bottom));max-width:430px;margin:0 auto;
  animation:rise .4s ease}
@keyframes rise{from{opacity:0;transform:translateY(14px)}}
.auth .brand{text-align:center;margin-bottom:32px}
.auth .mark{width:88px;height:88px;margin:0 auto 18px;border-radius:24px;
  background:linear-gradient(180deg,#161d27,#0e141c);border:1px solid var(--line2);
  display:grid;place-items:center;box-shadow:0 16px 40px rgba(0,0,0,.4)}
.auth .brand h1{font-size:27px;font-weight:700;letter-spacing:-.02em}
.auth .brand .tag{color:var(--muted);font-size:14px;margin-top:7px;line-height:1.4}
.auth .who{color:var(--brand);font-weight:600}
.auth .full{width:100%;padding:15px;border-radius:12px;font-weight:700;font-size:16px;
  background:var(--brand);color:#1a1205;margin-top:8px;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:9px}
.auth .full:active{transform:scale(.98)}
.auth .alt{text-align:center;margin-top:20px;font-size:14px;color:var(--muted)}
.auth .alt a{color:var(--brand);font-weight:600;cursor:pointer}
.auth .ghostbtn{width:100%;padding:13px;border-radius:12px;background:transparent;
  border:1px solid var(--line);color:var(--muted);font-size:14px;margin-top:12px;transition:.15s}
.auth .ghostbtn:active{transform:scale(.98)}
.err{color:var(--fault);font-size:13px;margin-top:-6px;margin-bottom:12px;min-height:1px}
.shake{animation:sh .35s}
@keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ---- shell ---- */
#app{max-width:560px;margin:0 auto;min-height:100%;padding-bottom:90px;position:relative}
.topbar{position:sticky;top:0;z-index:30;background:rgba(10,14,19,.86);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{display:block}
.logo b{font-weight:700;font-size:18px;letter-spacing:-.01em}
.logo .pro{font-size:10px;font-weight:700;color:var(--brand);border:1px solid var(--brand);
  border-radius:5px;padding:1px 5px;letter-spacing:.06em}
.topbar .spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--muted);
  border:1px solid transparent;transition:.15s}
.iconbtn:hover{background:var(--surface);color:var(--txt);border-color:var(--line)}
.iconbtn:active{transform:scale(.94)}
.wrap{padding:18px}

.statline{display:flex;gap:10px;margin-bottom:18px}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:12px 14px}
.stat .n{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;letter-spacing:-.02em}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

.dev{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;
  margin-bottom:12px;transition:.15s;position:relative;overflow:hidden}
.dev:active{transform:scale(.99)}
.dev:hover{border-color:var(--line2)}
.dev .top{display:flex;align-items:flex-start;gap:12px}
.dev .nm{font-size:17px;font-weight:600;letter-spacing:-.01em}
.dev .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.dev .cnt{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);
  text-align:right;white-space:nowrap;padding-top:2px}
.dev .cnt b{color:var(--txt);font-weight:600}
.usebar{display:flex;height:6px;border-radius:6px;overflow:hidden;margin-top:14px;background:var(--bg)}
.usebar i{display:block;height:100%}

.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.empty .em{width:64px;height:64px;margin:0 auto 18px;border-radius:16px;background:var(--surface);
  border:1px solid var(--line);display:grid;place-items:center}
.empty h3{color:var(--txt);font-size:18px;font-weight:600;margin-bottom:8px}
.empty p{font-size:14px;line-height:1.5;max-width:280px;margin:0 auto}

.fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:35;background:var(--brand);
  color:#1a1205;font-weight:700;font-size:15px;padding:14px 26px;border-radius:30px;display:flex;
  align-items:center;gap:9px;box-shadow:0 8px 28px rgba(245,166,35,.32);transition:.15s}
.fab:active{transform:translateX(-50%) scale(.96)}

.devhead{padding:16px 18px 8px}
.devhead .meta{font-size:13px;color:var(--muted);margin-top:4px}
.chips{display:flex;gap:8px;padding:14px 18px 6px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);
  border-radius:20px;padding:7px 13px;font-size:13px}
.chip .dot{width:8px;height:8px;border-radius:50%}
.chip b{font-family:'IBM Plex Mono',monospace;font-weight:600}

.search{margin:8px 18px 4px;position:relative}
.search input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:12px 14px 12px 40px;color:var(--txt);font-size:14px;outline:none}
.search input:focus{border-color:var(--brand)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}

.plate-wrap{margin:16px 0 6px;overflow-x:auto;padding:0 18px 6px;-webkit-overflow-scrolling:touch}
.plate{display:inline-flex;flex-direction:column;gap:7px;background:linear-gradient(180deg,#161d27,#11171f);
  border:1px solid var(--line2);border-radius:12px;padding:12px;min-width:100%}
.grp{display:flex;gap:5px;padding-right:9px;margin-right:4px;border-right:1px dashed var(--line)}
.grp:last-child{border-right:none;padding-right:0;margin-right:0}
.port{width:46px;height:50px;border-radius:7px;background:#0d1118;border:1px solid #222c39;display:flex;
  flex-direction:column;align-items:center;justify-content:space-between;padding:5px 3px 4px;
  position:relative;transition:.12s;flex-shrink:0}
.port:active{transform:scale(.93)}
.port .led{width:9px;height:9px;border-radius:50%;background:var(--free);transition:.2s}
.port .pn{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--muted)}
.port .tag{font-size:8px;color:var(--muted2);max-width:42px;overflow:hidden;white-space:nowrap;
  text-overflow:ellipsis;line-height:1}
.port[data-s="up"]{border-color:rgba(63,185,80,.45);background:#0e1813}
.port[data-s="up"] .led{background:var(--up);box-shadow:0 0 8px var(--up);animation:actblink 1s infinite}
.port[data-s="up"] .pn{color:#bdf0c5}
@keyframes actblink{0%,44%,52%,72%,100%{opacity:1}48%,50%,66%,88%{opacity:.28}}
@media (prefers-reduced-motion:reduce){.port .led{animation:none!important}}
.port[data-s="reserved"]{border-color:rgba(68,147,248,.4);background:#0d1420}
.port[data-s="reserved"] .led{background:var(--reserved);box-shadow:0 0 8px var(--reserved)}
.port[data-s="reserved"] .pn{color:#bcd6fb}
.port[data-s="fault"]{border-color:rgba(248,81,73,.45);background:#1a0f0f}
.port[data-s="fault"] .led{background:var(--fault);box-shadow:0 0 8px var(--fault);animation:blink 1.1s infinite}
.port[data-s="fault"] .pn{color:#f6b4b0}
.port.hit{outline:2px solid var(--brand);outline-offset:1px}
.port.dim{opacity:.28}
.port.linked::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;
  background:var(--brand);box-shadow:0 0 5px var(--brand)}
.port.trunk::before{content:"T";position:absolute;top:1px;left:3px;font-size:8px;font-weight:700;
  color:var(--reserved);font-family:'IBM Plex Mono',monospace}
.port.sfp{border-color:rgba(68,147,248,.5);background:#0c1220;border-radius:3px;
  box-shadow:inset 0 0 0 1px rgba(68,147,248,.12)}
.port.sfp .pn{color:#bcd6fb}
@keyframes blink{50%{opacity:.35}}

.legend{display:flex;gap:16px;padding:6px 18px 10px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
.legend i{width:8px;height:8px;border-radius:50%}

.sheet-bg{position:fixed;inset:0;background:rgba(3,6,10,.66);z-index:50;opacity:0;pointer-events:none;
  transition:.22s;backdrop-filter:blur(2px)}
.sheet-bg.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:100%;
  max-width:560px;background:var(--bg2);z-index:51;border-radius:20px 20px 0 0;border:1px solid var(--line);
  border-bottom:none;transition:transform .26s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;
  padding:8px 20px calc(26px + env(safe-area-inset-bottom))}
.sheet.on{transform:translateX(-50%) translateY(0)}
.grip{width:38px;height:4px;background:var(--line2);border-radius:4px;margin:8px auto 14px}
.sheet h2{font-size:19px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
.sheet .hint{font-size:13px;color:var(--muted);margin-bottom:18px}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;
  letter-spacing:.04em;font-weight:500}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--line);
  border-radius:10px;padding:12px 13px;color:var(--txt);font-size:15px;outline:none;transition:.15s}
.field input:focus,.field textarea:focus{border-color:var(--brand)}
.field textarea{resize:vertical;min-height:60px}

.seg{display:flex;gap:6px}
.seg button{flex:1;padding:11px 4px;border-radius:9px;background:var(--surface);border:1px solid var(--line);
  font-size:13px;font-weight:500;color:var(--muted);transition:.12s;display:flex;align-items:center;
  justify-content:center;gap:6px}
.seg button .d{width:8px;height:8px;border-radius:50%}
.seg button.sel{color:var(--txt);background:var(--surface2);border-color:var(--line2)}
.seg button[data-v="up"].sel{border-color:var(--up)}
.seg button[data-v="reserved"].sel{border-color:var(--reserved)}
.seg button[data-v="fault"].sel{border-color:var(--fault)}

.row2{display:flex;gap:10px}
.row2 .field{flex:1}
.pcount{display:flex;gap:8px}
.pcount button{flex:1;padding:12px 0;border-radius:10px;background:var(--surface);border:1px solid var(--line);
  font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--muted);transition:.12s}
.pcount button.sel{color:var(--brand);border-color:var(--brand);background:var(--brand-dim)}

.btnrow{display:flex;gap:10px;margin-top:22px}
.btn{flex:1;padding:14px;border-radius:11px;font-weight:600;font-size:15px;transition:.15s;display:flex;
  align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98)}
.btn.prim{background:var(--brand);color:#1a1205}
.btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--txt)}

.linkcard{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
  border-radius:11px;padding:11px 13px;margin-bottom:6px;font-size:14px}
.linkcard .lc-i{color:var(--brand);flex-shrink:0}
.linkcard .lc-x{margin-left:auto;color:var(--muted);font-size:13px;padding:4px 8px;border-radius:7px;border:1px solid var(--line)}
.traceflow{display:flex;flex-direction:column;gap:0;margin-top:6px}
.tracenode{background:var(--surface);border:1px solid var(--line2);border-radius:11px;padding:12px 14px}
.tracenode .tn-top{font-weight:600;font-size:14.5px}
.tracenode .tn-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.tracelink{text-align:center;color:var(--brand);font-size:13px;padding:7px 0;font-family:'IBM Plex Mono',monospace}

/* photo mapper */
.photowrap{position:relative;border-radius:12px;overflow:hidden;background:#000;margin:6px 0;user-select:none}
.photowrap img{display:block;width:100%;height:auto}
.pmark{position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;
  background:var(--brand);color:#1a1205;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;
  display:grid;place-items:center;border:2px solid #1a1205;box-shadow:0 1px 5px rgba(0,0,0,.5);cursor:pointer}
.pmark.hl{animation:pulse 1s ease infinite;background:var(--up)}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.35)}}
.photohint{background:var(--brand-dim);border:1px solid rgba(245,166,35,.4);color:var(--brand);
  border-radius:10px;padding:10px 13px;font-size:13.5px;margin:6px 0;text-align:center;font-weight:600}

/* impact */
.impsum{background:#1a0f0f;border:1px solid rgba(248,81,73,.4);border-radius:12px;padding:13px 15px;margin-bottom:12px}
.impsum b{font-family:'IBM Plex Mono',monospace;color:var(--fault);font-size:20px}
.impitem{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);font-size:14px}
.impitem:last-child{border-bottom:none}
.impitem .id{width:8px;height:8px;border-radius:50%;background:var(--fault);flex-shrink:0}
.impitem .im-sub{color:var(--muted);font-size:12px;margin-left:auto;font-family:'IBM Plex Mono',monospace}

/* topology */
.topowrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--bg2);margin:6px 0;max-height:60vh}
.toponode{cursor:pointer}
.toponode rect{transition:.15s}
.qrbox{margin-top:18px;text-align:center;display:none}.qrbox.on{display:block;animation:fade .3s}
.qrcard{display:inline-block;background:#fff;padding:14px;border-radius:12px}
.qrbox p{font-size:11.5px;color:var(--muted);margin-top:10px;font-family:'IBM Plex Mono',monospace;
  word-break:break-word;max-width:280px;margin-left:auto;margin-right:auto}
@keyframes fade{from{opacity:0;transform:translateY(6px)}}

.menu-item{display:flex;align-items:center;gap:14px;padding:15px 4px;font-size:15.5px;border-bottom:1px solid var(--line)}
.menu-item:last-child{border-bottom:none}
.menu-item svg{color:var(--muted)}
.menu-item.warn{color:var(--fault)}
.menu-item.warn svg{color:var(--fault)}

.prohead{text-align:center;padding:6px 0 4px}
.prohead .crown{width:54px;height:54px;margin:0 auto 14px;border-radius:15px;background:var(--brand-dim);
  border:1px solid rgba(245,166,35,.4);display:grid;place-items:center}
.profeat{display:flex;align-items:center;gap:12px;padding:11px 0;font-size:14.5px;border-bottom:1px solid var(--line)}
.profeat svg{color:var(--brand);flex-shrink:0}
.price{text-align:center;margin:18px 0 6px}
.price .big{font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:600}
.price .lbl{font-size:12px;color:var(--muted)}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);
  border:1px solid var(--line2);color:var(--txt);padding:11px 18px;border-radius:11px;font-size:14px;z-index:60;
  opacity:0;pointer-events:none;transition:.25s;max-width:90%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}

/* ---- print / PDF ---- */
#printArea{display:none}
@media screen{#printArea{display:none!important}}
@media print{
  body.printing>#root,body.printing>#app,body.printing>#bg,body.printing>#sheet,body.printing>#toast{display:none!important}
  body.printing>#printArea{display:block!important}
  body{background:#fff;color:#111}
  @page{margin:14mm}
}
#printArea{color:#111;font-family:'Space Grotesk',Arial,sans-serif}
#printArea .rh h1{font-size:22px;margin:0}
#printArea .rsub{color:#555;font-size:13px;margin-top:2px}
#printArea .rmeta{font-size:12px;color:#333;margin:10px 0 12px;border-bottom:2px solid #f5a623;padding-bottom:8px}
#printArea .rmeta b{color:#000}
#printArea .rt{width:100%;border-collapse:collapse;font-size:12px}
#printArea .rt th{text-align:left;background:#f3f4f6;padding:7px 8px;border-bottom:1px solid #ccc;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
#printArea .rt td{padding:6px 8px;border-bottom:1px solid #eee}
#printArea .rt .pn{font-family:'IBM Plex Mono',monospace;font-weight:600}
#printArea .pd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
#printArea .rf{margin-top:16px;font-size:10px;color:#999;text-align:center}
#printArea .lh{font-size:16px;margin:0 0 12px}
#printArea .lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
#printArea .lbl{border:1px dashed #bbb;border-radius:6px;padding:7px;display:flex;gap:8px;align-items:center;break-inside:avoid}
#printArea .lbl .lq img,#printArea .lbl .lq canvas{display:block}
#printArea .lbl .lt{font-size:9px;line-height:1.25}
#printArea .lbl .lt b{font-size:10px}
/* ===== PRO+ : стойка и глобальный поиск ===== */
.rackbox{border:1px solid var(--line);border-radius:12px;background:var(--bg2);margin:10px 0;overflow:hidden}
.rackhead{padding:9px 12px;font-weight:700;font-size:13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.racku{display:flex;align-items:stretch;border-bottom:1px solid var(--line);min-height:30px}
.racku:last-child{border-bottom:none}
.racku .un{width:34px;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);border-right:1px solid var(--line);flex-shrink:0}
.racku .uslot{flex:1;display:flex;align-items:center;padding:3px 8px;cursor:pointer}
.racku .uslot:active{background:var(--surface)}
.racku.place .uslot{background:rgba(245,166,35,.07);outline:1px dashed var(--brand);outline-offset:-3px}
.rackdev{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12.5px;font-weight:600;min-width:0}
.rackdev .rd-nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rackdev .rd-x{margin-left:auto;color:var(--muted);font-size:15px;padding:0 4px;flex-shrink:0}
.rackfree{flex:1;color:var(--muted);font-size:11px;opacity:.45}
.gsr-i{cursor:pointer}
.gsr-i .gs-port{font-family:'IBM Plex Mono',monospace;color:var(--brand);flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<div id="app" class="hidden"></div>
<div class="sheet-bg" id="bg"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>

/* ============ storage ============ */
const Store=(()=>{let mem={},ok=true;
  try{const k='__pm_t';localStorage.setItem(k,'1');localStorage.removeItem(k);}catch(e){ok=false;}
  return{get(k){if(mem[k]!==undefined)return mem[k];/* свежая запись после сбоя квоты приоритетнее */
           try{return ok?localStorage.getItem(k):null;}catch(e){return null;}},
         set(k,v){try{if(ok){localStorage.setItem(k,v);delete mem[k];}else{mem[k]=v;}return true;}catch(e){mem[k]=v;return false;}}};})();

/* IndexedDB — надёжное основное хранилище (без лимита ~5МБ).
   localStorage остаётся быстрым кэшем для мгновенного старта. */
const IDB=(()=>{let db=null;
  function open(){return new Promise((res,rej)=>{if(db)return res(db);
    if(!('indexedDB' in window))return rej(new Error('no idb'));
    const r=indexedDB.open('portmap',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>{db=r.result;res(db);};r.onerror=()=>rej(r.error);});}
  return{
    get(k){return open().then(d=>new Promise((res,rej)=>{const q=d.transaction('kv').objectStore('kv').get(k);
      q.onsuccess=()=>res(q.result??null);q.onerror=()=>rej(q.error);}));},
    set(k,v){return open().then(d=>new Promise((res,rej)=>{const tx=d.transaction('kv','readwrite');
      tx.objectStore('kv').put(v,k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}
  };})();

let DB={account:null,devices:[],pro:false};
let _lsWarned=false;
function load(){const r=Store.get('portmap_db');if(r){try{DB=JSON.parse(r);}catch(e){}}}
async function loadIDB(){/* восстановление из IndexedDB, если localStorage пуст, битый или переполнялся */
  try{const r=await IDB.get('portmap_db');if(!r)return false;
    const cur=Store.get('portmap_db');
    if(!cur||cur.length<r.length){const parsed=JSON.parse(r);DB=parsed;Store.set('portmap_db',r);return true;}
  }catch(e){}
  return false;}
function save(){const json=JSON.stringify(DB);
  const ok=Store.set('portmap_db',json);
  if(!ok&&!_lsWarned){_lsWarned=true;toast('⚠ localStorage переполнен — данные пишутся в IndexedDB');}
  IDB.set('portmap_db',json).catch(()=>{});

function logEvent(text){DB.log=DB.log||[];DB.log.unshift({ts:Date.now(),user:(DB.account&&DB.account.name)||DB.cloudEmail||'—',text});
  if(DB.log.length>300)DB.log.length=300;}
function relTime(ts){const s=(Date.now()-ts)/1000;if(s<60)return 'только что';if(s<3600)return Math.floor(s/60)+' мин назад';
  if(s<86400)return Math.floor(s/3600)+' ч назад';return new Date(ts).toLocaleDateString('ru-RU')+' '+new Date(ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}
function showChangelog(){const log=DB.log||[];
  const items=log.length?log.map(e=>`<div class="impitem"><div><div>${esc(e.text)}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(e.user)} · ${relTime(e.ts)}</div></div></div>`).join('')
    :`<div class="hint" style="margin:8px 0">${t('log_empty')}</div>`;
  openSheet(`<h2>${t('changelog')}</h2><div class="hint">Последние действия по портам и объектам</div>${items}

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}

function counts(d){let c={up:0,reserved:0,fault:0,free:0};
  for(let i=1;i<=d.portCount;i++){const p=d.ports[i];c[(p&&p.status)||'free']++;}
  c.used=c.up+c.reserved+c.fault;return c;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200);}

}

     <div class="err" id="r_err"></div>

async function doRegister(){
  const name=val('r_name'),p=val('r_pass'),p2=val('r_pass2'),err=document.getElementById('r_err');
  if(!name){return fail(err,'Введи имя');}
  if(p.length<4){return fail(err,'Пароль слишком короткий');}
  if(p!==p2){return fail(err,'Пароли не совпадают');}
  const salt=[...crypto.getRandomValues(new Uint8Array(16))].map(x=>x.toString(16).padStart(2,'0')).join('');
  DB.account={name,salt,hash:await sha256(salt+p),created:new Date().toISOString()};
  save();authed=true;boot();toast('Аккаунт создан 🎉');
}
function renderLogin(){
  document.getElementById('root').innerHTML=`
   <div class="auth">
     <div class="brand"><div class="mark">${I.logoBig}</div>
       <h1>${t('welcome_back')}</h1>
       <div class="tag">${t('loggedAs')} <span class="who">${esc(DB.account.name)}</span></div></div>
     <div class="field"><label>${t('pass')}</label><input id="l_pass" type="password" placeholder="${t('your_pass')}" autofocus></div>
     <div class="err" id="l_err"></div>
     <button class="full" id="l_go">${I.out} ${t('login')}</button>
     <button class="ghostbtn" id="l_reset">${t('forgot')}</button>
   </div>`;
  const pi=document.getElementById('l_pass');
  document.getElementById('l_go').onclick=doLogin;
  pi.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('l_reset').onclick=()=>{
    if(confirm('Сбросить аккаунт? Свитчи и порты останутся, но придётся создать аккаунт заново.')){
      DB.account=null;save();boot();}
  };
  setTimeout(()=>pi.focus(),100);
}
async function doLogin(){
  const p=val('l_pass'),err=document.getElementById('l_err');
  const a=DB.account;let okp=false;
  if(a.salt){okp=(await sha256(a.salt+p))===a.hash;}
  else{okp=(await sha256(p))===a.hash;
    if(okp){/* миграция старого несолёного хэша */
      const salt=[...crypto.getRandomValues(new Uint8Array(16))].map(x=>x.toString(16).padStart(2,'0')).join('');
      a.salt=salt;a.hash=await sha256(salt+p);save();}}
  if(okp){authed=true;boot();}
  else{fail(err,'Неверный пароль');document.querySelector('.auth').classList.add('shake');
    setTimeout(()=>document.querySelector('.auth')?.classList.remove('shake'),360);}
}
function fail(el,msg){el.textContent=msg;}
function logout(){
  if(CLOUD.enabled&&_fb){_fb.auth.signOut().catch(()=>{});closeSheet();return;}
  authed=false;closeSheet();boot();
}

/* ============ CLOUD (Firebase) ============ */
function loadFirebase(){return new Promise((res,rej)=>{
  if(window.firebase&&firebase.firestore){return res();}
  const urls=['https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'];
  let i=0;(function next(){if(i>=urls.length)return res();
    const s=document.createElement('script');s.src=urls[i++];s.onload=next;
    s.onerror=()=>rej(new Error('firebase'));document.head.appendChild(s);})();});}
async function cloudInit(){
  await loadFirebase();
  if(!firebase.apps.length)firebase.initializeApp(CLOUD.config);
  _fb={auth:firebase.auth(),db:firebase.firestore(),user:null};
  try{await _fb.db.enablePersistence({synchronizeTabs:true});}catch(e){}
}
async function cloudPull(uid){
  try{const doc=await _fb.db.collection('users').doc(uid).get();
    if(doc.exists){const d=doc.data();DB.devices=d.devices||[];DB.pro=!!d.pro;}
    else{DB.devices=DB.devices||[];}}catch(e){toast('Облако недоступно, работаю офлайн');}
}
async function cloudPush(){if(!_fb?.user)return;
  await _fb.db.collection('users').doc(_fb.user.uid).set(
    {devices:DB.devices,pro:DB.pro,updated:Date.now()},{merge:true});}
function cloudBoot(){
  showRoot();
  document.getElementById('root').innerHTML=`<div class="auth"><div class="brand">
    <div class="mark">${I.logoBig}</div><h1>PortMap Pro</h1>
    <div class="tag">Подключаюсь к облаку…</div></div></div>`;
  cloudInit().then(()=>{
    _fb.auth.onAuthStateChanged(async user=>{
      _fb.user=user||null;
      if(user){DB.cloudEmail=user.email;await cloudPull(user.uid);authed=true;showApp();renderHome();if(!DB.onboarded)setTimeout(showOnboarding,350);}
      else{authed=false;renderCloudAuth('login');}
    });
  }).catch(()=>{document.getElementById('root').innerHTML=
    `<div class="auth"><div class="brand"><div class="mark">${I.logoBig}</div>
      <h1>Облако не настроено</h1><div class="tag">Проверь firebaseConfig в коде или интернет.</div></div></div>`;});
}
function renderCloudAuth(mode){
  showRoot();const reg=mode==='register';
  document.getElementById('root').innerHTML=`<div class="auth">
    <div class="brand"><div class="mark">${I.logoBig}</div>
      <h1>${reg?'Создать аккаунт':'Вход в облако'}</h1>

async function cloudAuth(reg){
  const em=val('c_email'),p=val('c_pass'),err=document.getElementById('c_err');
  if(!em){return fail(err,'Введи email');}if(p.length<6){return fail(err,'Пароль минимум 6 символов');}
  try{if(reg)await _fb.auth.createUserWithEmailAndPassword(em,p);
      else await _fb.auth.signInWithEmailAndPassword(em,p);
      // если локально уже были свитчи — зальём их в облако при первом входе
      if(reg&&DB.devices.length)await cloudPush();
  }catch(e){fail(err,fbErr(e.code));}
}

function matchPort(p,q){if(!q)return null;q=q.toLowerCase();if(!p)return false;
  return[p.device,p.vlan,p.cableId,p.location,p.note].some(v=>v&&String(v).toLowerCase().includes(q));}
function drawPlate(d){
  const plate=document.getElementById('plate'),q=view.filter.trim();
  const sfpFrom=d.sfpFrom||0, copperMax=sfpFrom?sfpFrom-1:d.portCount;
  const cols=Math.ceil(copperMax/2),GROUP=6;let html='';
  for(let g=0;g*GROUP<cols;g++){let t='',b='';
    for(let col=g*GROUP;col<Math.min((g+1)*GROUP,cols);col++){
      const oddN=col*2+1,evenN=col*2+2;
      t+=oddN<=copperMax?portCell(d,oddN,q):'<div class="port" style="visibility:hidden"></div>';
      b+=evenN<=copperMax?portCell(d,evenN,q):'<div class="port" style="visibility:hidden"></div>';}
    html+=`<div class="grp"><div style="display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;gap:5px">${t}</div><div style="display:flex;gap:5px">${b}</div></div></div>`;}
  if(sfpFrom){let cw='';const nums=[];for(let n=sfpFrom;n<=d.portCount;n++)nums.push(n);
    for(let i=0;i<nums.length;i+=2){const a=nums[i],b2=nums[i+1];
      cw+=`<div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;gap:5px">${portCell(d,a,q)}</div>
        <div style="display:flex;gap:5px">${b2?portCell(d,b2,q):'<div class="port" style="visibility:hidden"></div>'}</div></div>`;}
    html+=`<div class="grp" style="display:flex;gap:5px;align-items:center"><span style="font-size:9px;color:var(--reserved);font-family:'IBM Plex Mono',monospace;font-weight:600;margin-right:2px">SFP</span>${cw}</div>`;}
  plate.innerHTML=`<div style="display:flex">${html}</div>`;
  plate.querySelectorAll('.port[data-n]').forEach(el=>el.onclick=()=>openPort(d,+el.dataset.n));
}
function portCell(d,n,q){const p=d.ports[n],s=(p&&p.status)||'free';let cls='';
  if(q){const m=matchPort(p,q);cls=m?'hit':'dim';}
  if(p&&p.link)cls+=' linked';
  if(p&&p.mode==='trunk')cls+=' trunk';
  const isSfp=d.sfpFrom&&n>=d.sfpFrom;if(isSfp)cls+=' sfp';
  const label=isSfp?'◈':n;
  const tag=p&&p.device?esc(p.device):'';
  return `<div class="port ${cls}" data-s="${s}" data-n="${n}"><span class="led"></span><span class="pn">${label}</span><span class="tag">${tag}</span></div>`;}

  const sm=document.getElementById('segmode');if(sm)sm.querySelectorAll('button').forEach(b=>b.onclick=()=>{

function readPort(){return{status:editPort.status,mode:editPort.mode,device:val('f_device'),vlan:val('f_vlan'),
  cableId:val('f_cable'),location:val('f_loc'),note:val('f_note')};}
function savePort(){const p=readPort();const cur=editPort.d.ports[editPort.n]||{};const link=cur.link;
  if(p.mode==='access')delete p.mode;
  const empty=p.status==='free'&&p.mode!=='trunk'&&!p.device&&!p.vlan&&!p.cableId&&!p.location&&!p.note&&!link;
  if(empty){removeReverse(editPort.d,editPort.n);delete editPort.d.ports[editPort.n];}
  else{if(link)p.link=link;
    /* переносим историю и фиксируем изменения */
    if(cur.hist)p.hist=cur.hist;
    p.ts=(cur.status||'free')!==p.status?Date.now():(cur.ts||Date.now());
    const ch=portDiff(cur,p);if(ch.length)portHist(p,ch.join('; '));
    editPort.d.ports[editPort.n]=p;}
  logEvent(`${editPort.d.name} · порт ${editPort.n}: ${empty?'очищен':(STATLBL[p.status]||p.status)+(p.mode==='trunk'?' (trunk)':'')}`);
  save();closeSheet();renderDevice();toast('Сохранено');}
function showQR(){const p=readPort(),d=editPort.d;
  const tag=`#PM:${d.id}:${editPort.n}#`;
  const human=`${d.name} | Порт ${editPort.n}`+(p.device?` | ${p.device}`:'')+
    (p.vlan?` | VLAN ${p.vlan}`:'')+(p.cableId?` | Каб ${p.cableId}`:'')+(p.location?` | ${p.location}`:'');
  const txt=`${tag} PortMap | ${human}`;
  const box=document.getElementById('qrbox'),qr=document.getElementById('qr');qr.innerHTML='';
  new QRCode(qr,{text:txt,width:170,height:170,colorDark:'#0a0e13',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  document.getElementById('qrtext').textContent=human;box.classList.add('on');
  box.scrollIntoView({behavior:'smooth',block:'center'});}

/* ============ QR SCANNER ============ */
let _scanLib=false;
function loadScanLib(){return new Promise((res,rej)=>{
  if(window.Html5Qrcode){return res();}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js';
  s.onload=res;s.onerror=()=>rej(new Error('lib'));document.head.appendChild(s);});}
let _scanner=null;
function openScanner(){
  const noCam=!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia);
  openSheet(`<h2>Сканировать</h2>
    <div class="hint">QR камерой, из фото или NFC-меткой</div>
    <div id="reader" style="width:100%;border-radius:14px;overflow:hidden;background:#000;min-height:220px"></div>
    <div class="err" id="scan_err" style="margin-top:10px"></div>
    <div class="btnrow"><button class="btn ghost" id="scanFileBtn">${I.photo} Из фото</button>
      <button class="btn ghost" id="nfcScanBtn">${I.nfc} NFC</button></div>
    <div class="btnrow" style="margin-top:10px"><button class="btn ghost" id="scanClose">Закрыть</button></div>`);
  document.getElementById('scanClose').onclick=closeScanner;
  document.getElementById('nfcScanBtn').onclick=scanNFC;
  document.getElementById('scanFileBtn').onclick=scanFromFile;
  const err=document.getElementById('scan_err');
  loadScanLib().then(()=>{
    if(noCam){err.textContent='Камера недоступна в этом окне. Открой по HTTPS / в APK — либо жми «Из фото».';return;}
    _scanner=new Html5Qrcode('reader');
    _scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:210,height:210}},onScan,()=>{})
      .catch(e=>{err.textContent='Камера не открылась ('+((e&&e.message)||'нет доступа')+'). Разреши камеру или жми «Из фото».';});
  }).catch(()=>{err.textContent='Сканер не загрузился (нужен интернет в первый раз). Жми «Из фото».';});
}
function scanFromFile(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;
    loadScanLib().then(()=>{stopScanner();
      const tmp=new Html5Qrcode('reader');
      tmp.scanFile(f,true).then(txt=>{try{tmp.clear();}catch(e){}onScan(txt);})
        .catch(()=>{document.getElementById('scan_err').textContent='На фото не найден QR-код';});});};
  inp.click();}
function stopScanner(){if(_scanner){try{_scanner.stop().then(()=>_scanner.clear()).catch(()=>{});}catch(e){}_scanner=null;}}
function closeScanner(){stopScanner();closeSheet();}
function onScan(text){
  let d=null,port=null;
  const md=text.match(/#PMD:([a-z0-9]+)#/i);
  if(md){const dd=DB.devices.find(x=>x.id===md[1]);
    if(dd){stopScanner();closeSheet();if(navigator.vibrate)navigator.vibrate(40);openDevice(dd.id);toast(dd.name);return;}}
  const m=text.match(/#PM:([a-z0-9]+):(\d+)#/i);
  if(m){d=DB.devices.find(x=>x.id===m[1]);port=+m[2];}
  if(!d){const nm=text.match(/PortMap\s*\|\s*([^|]+?)\s*\|\s*Порт\s*(\d+)/i);
    if(nm){const nameQ=nm[1].trim().toLowerCase();
      d=DB.devices.find(x=>x.name.toLowerCase()===nameQ)||DB.devices.find(x=>x.name.toLowerCase().includes(nameQ));
      port=+nm[2];}}
  if(d&&port){stopScanner();closeSheet();
    if(navigator.vibrate)navigator.vibrate(40);
    openDevice(d.id);setTimeout(()=>openPort(d,port),260);toast(`Порт ${port} · ${d.name}`);}
  else{const err=document.getElementById('scan_err');if(err)err.textContent='Это не метка PortMap или объект не найден';}
}

function devById(id){return DB.devices.find(x=>x.id===id);}
function persistPortFields(){const p=readPort();const cur=editPort.d.ports[editPort.n]||{};
  editPort.d.ports[editPort.n]=Object.assign({},cur,p);save();}
function removeReverse(d,n){const lk=d.ports[n]&&d.ports[n].link;if(!lk)return;
  const o=devById(lk.deviceId);if(o&&o.ports[lk.port]&&o.ports[lk.port].link&&
    o.ports[lk.port].link.deviceId===d.id&&o.ports[lk.port].link.port===n)delete o.ports[lk.port].link;}
function doLink(aD,aN,bDId,bN){const bD=devById(bDId);if(!bD)return;
  if(!aD.ports[aN])aD.ports[aN]={status:aD.type==='panel'?'reserved':'up'};
  if(!bD.ports[bN])bD.ports[bN]={status:bD.type==='panel'?'reserved':'up'};
  removeReverse(aD,aN);removeReverse(bD,bN);
  aD.ports[aN].link={deviceId:bD.id,port:bN};
  bD.ports[bN].link={deviceId:aD.id,port:aN};

  logEvent(`Связь: ${aD.name}:${aN} ↔ ${bD.name}:${bN}`);save();}

/* ===== фото-разметка портов ===== */
function compressImage(file,maxW,q){return new Promise((res,rej)=>{const fr=new FileReader();
  fr.onload=()=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width);
    const c=document.createElement('canvas');c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',q));};
    img.onerror=rej;img.src=fr.result;};fr.onerror=rej;fr.readAsDataURL(file);});}
let photoState={dev:null,placing:false,highlight:null};
function openPhotoMapper(d,highlight){photoState={dev:d,placing:false,highlight:highlight||null};renderPhotoMapper();}
function nextFreeMark(d){const m=d.photoMarkers||[];for(let i=1;i<=d.portCount;i++)if(!m.find(x=>x.n===i))return i;return null;}
function renderPhotoMapper(){const d=photoState.dev;const markers=d.photoMarkers||[];let body;
  if(!d.photo){body=`<div class="photohint">Сфоткай свитч — потом расставишь порты прямо на снимке</div>
    <button class="btn prim" id="pm_add" style="width:100%">${I.photo} Сделать / выбрать фото</button>`;}
  else{const marks=markers.map(m=>`<div class="pmark ${photoState.highlight===m.n?'hl':''}" data-n="${m.n}" style="left:${m.x*100}%;top:${m.y*100}%">${m.n}</div>`).join('');
    const nn=nextFreeMark(d);
    body=`${photoState.placing?`<div class="photohint">${nn?'Тапни на фото, где порт '+nn:'Все порты расставлены'}</div>`:''}
      <div class="photowrap" id="pw"><img src="${d.photo}" id="pimg">${marks}</div>
      <div class="btnrow" style="margin-top:4px">${photoState.placing
        ?`<button class="btn prim" id="pm_done">Готово</button><button class="btn ghost" id="pm_reset">Сбросить метки</button>`
        :`<button class="btn ghost" id="pm_place">${I.mapg} Расставить порты</button><button class="btn ghost" id="pm_change">${I.photo} Сменить фото</button>`}</div>`;}
  openSheet(`<h2>Фото · ${esc(d.name)}</h2><div class="hint">Разметка портов поверх реального снимка</div>${body}
    <div class="btnrow" style="margin-top:10px"><button class="btn ghost" id="pm_close">Закрыть</button></div>`);
  document.getElementById('pm_close').onclick=()=>{photoState.placing=false;closeSheet();renderDevice();};
  ['pm_add','pm_change'].forEach(id=>{const b=document.getElementById(id);if(b)b.onclick=pmPickPhoto;});
  const place=document.getElementById('pm_place');if(place)place.onclick=()=>{photoState.placing=true;renderPhotoMapper();};
  const done=document.getElementById('pm_done');if(done)done.onclick=()=>{photoState.placing=false;renderPhotoMapper();};
  const reset=document.getElementById('pm_reset');if(reset)reset.onclick=()=>{d.photoMarkers=[];save();renderPhotoMapper();};

  if(img)img.onclick=(e)=>{if(!photoState.placing)return;const r=img.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;if(x<0||x>1||y<0||y>1)return;
    const nn=nextFreeMark(d);if(nn==null){toast('Все порты расставлены');return;}
    d.photoMarkers=d.photoMarkers||[];d.photoMarkers.push({n:nn,x,y});save();renderPhotoMapper();};
  document.querySelectorAll('.pmark').forEach(el=>el.onclick=(e)=>{if(photoState.placing){e.stopPropagation();return;}
    closeSheet();setTimeout(()=>openPort(d,+el.dataset.n),150);});}
function pmPickPhoto(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';

    try{photoState.dev.photo=await compressImage(f,1100,0.62);save();renderPhotoMapper();toast('Фото добавлено');}
    catch(e){toast('Не удалось обработать фото');}};inp.click();}

/* ===== impact-анализ ===== */
function impactFrom(seeds,excludeDevId){const visited=new Set(),devSet=new Set(),leaves=[];const q=seeds.slice();
  while(q.length){const cur=q.shift();const key=cur.devId+':'+cur.port;if(visited.has(key))continue;visited.add(key);
    const d=devById(cur.devId);if(!d)continue;if(d.id!==excludeDevId)devSet.add(d.id);
    const p=d.ports[cur.port]||{};if(p.device)leaves.push({name:p.device,dev:d.name,port:cur.port});
    for(let i=1;i<=d.portCount;i++){if(i===cur.port)continue;const pp=d.ports[i];if(!pp)continue;
      if(pp.link)q.push({devId:pp.link.deviceId,port:pp.link.port});
      else if(pp.device)leaves.push({name:pp.device,dev:d.name,port:i});}}
  return{devices:[...devSet],leaves};}
function showImpactPort(d,n){const lk=d.ports[n]&&d.ports[n].link;
  if(!lk){toast('У порта нет связи — нечему падать');return;}
  renderImpact(`Отключение ${d.name} · порт ${n}`,impactFrom([{devId:lk.deviceId,port:lk.port}],d.id),()=>openPort(d,n));}
function showImpactDevice(d){const seeds=[],direct=[];
  for(let i=1;i<=d.portCount;i++){const p=d.ports[i];if(!p)continue;
    if(p.link)seeds.push({devId:p.link.deviceId,port:p.link.port});
    else if(p.device)direct.push({name:p.device,dev:d.name,port:i});}
  const r=impactFrom(seeds,d.id);r.leaves=direct.concat(r.leaves);
  renderImpact(`Отключение всего объекта «${d.name}»`,r,closeSheet);}
function renderImpact(title,r,back){const seen=new Set();
  const leaves=r.leaves.filter(l=>{const k=l.dev+':'+l.port;if(seen.has(k))return false;seen.add(k);return true;});
  let items=leaves.map(l=>`<div class="impitem"><span class="id"></span><div>${esc(l.name)}</div><div class="im-sub">${esc(l.dev)}·${l.port}</div></div>`).join('');
  if(!items&&!r.devices.length)items='<div class="hint" style="margin:6px 0">Ничего не отвалится — вниз по трассе пусто.</div>';
  openSheet(`<h2>${I.bolt} Impact-анализ</h2><div class="hint">${esc(title)}</div>
    <div class="impsum">Отвалится устройств: <b>${leaves.length}</b> · затронуто объектов: <b>${r.devices.length}</b></div>${items}
    <div class="hint" style="margin-top:12px;font-size:12px">Считается, что эта связь — единственный аплинк.</div>
    <div class="btnrow"><button class="btn ghost" id="imp_back">Назад</button></div>`);
  document.getElementById('imp_back').onclick=back;}

/* ===== авто-топология ===== */
function showTopology(){const devs=DB.devices;if(!devs.length){toast('Нет объектов');return;}
  const edgeSet=new Set(),edges=[];
  devs.forEach(d=>{for(let i=1;i<=d.portCount;i++){const p=d.ports[i];
    if(p&&p.link&&p.link.deviceId!==d.id){const key=[d.id,p.link.deviceId].sort().join('|');
      if(!edgeSet.has(key)){edgeSet.add(key);edges.push([d.id,p.link.deviceId]);}}}});
  if(!edges.length){openSheet(`<h2>${I.mapg} Схема сети</h2><div class="hint">Свяжи порты объектов, чтобы построить топологию.</div><div class="btnrow"><button class="btn ghost" id="tp_close">Закрыть</button></div>`);document.getElementById('tp_close').onclick=closeSheet;return;}
  const adj={};devs.forEach(d=>adj[d.id]=[]);edges.forEach(([a,b])=>{if(adj[a])adj[a].push(b);if(adj[b])adj[b].push(a);});
  let root=edges[0][0],mx=-1;devs.forEach(d=>{if((adj[d.id]||[]).length>mx){mx=adj[d.id].length;root=d.id;}});
  const level={},order=[],seen=new Set([root]);let queue=[root];level[root]=0;
  while(queue.length){const id=queue.shift();order.push(id);
    (adj[id]||[]).forEach(nb=>{if(!seen.has(nb)){seen.add(nb);level[nb]=level[id]+1;queue.push(nb);}});}
  const byLevel={};order.forEach(id=>{(byLevel[level[id]]=byLevel[level[id]]||[]).push(id);});
  const levels=Object.keys(byLevel).map(Number).sort((a,b)=>a-b);
  const NW=124,NH=46,GX=26,GY=72,PAD=22;
  const maxRow=Math.max(...levels.map(l=>byLevel[l].length));
  const W=Math.max(300,PAD*2+maxRow*NW+(maxRow-1)*GX),H=PAD*2+levels.length*NH+(levels.length-1)*GY;
  const pos={};levels.forEach((l,li)=>{const row=byLevel[l];const rowW=row.length*NW+(row.length-1)*GX;const sx=(W-rowW)/2;
    row.forEach((id,i)=>{pos[id]={x:sx+i*(NW+GX)+NW/2,y:PAD+li*(NH+GY)+NH/2};});});
  let lines='';edges.forEach(([a,b])=>{if(pos[a]&&pos[b])lines+=`<line x1="${pos[a].x}" y1="${pos[a].y}" x2="${pos[b].x}" y2="${pos[b].y}" stroke="#2c3847" stroke-width="1.5"/>`;});
  let nodes='';order.forEach(id=>{const d=devById(id),pp=pos[id];const col=d.type==='panel'?'#4493f8':'#f5a623';
    nodes+=`<g class="toponode" data-id="${id}"><rect x="${pp.x-NW/2}" y="${pp.y-NH/2}" width="${NW}" height="${NH}" rx="9" fill="#141b25" stroke="${col}" stroke-width="1.4"/>
      <text x="${pp.x}" y="${pp.y-2}" text-anchor="middle" fill="#e6edf3" font-size="12" font-family="Space Grotesk" font-weight="600">${esc(d.name.slice(0,15))}</text>
      <text x="${pp.x}" y="${pp.y+13}" text-anchor="middle" fill="#8b97a7" font-size="9" font-family="IBM Plex Mono">${d.type==='panel'?'панель':'свитч'} · ${counts(d).used}/${d.portCount}</text></g>`;});
  openSheet(`<h2>${I.mapg} Схема сети</h2><div class="hint">Построена автоматически из связей портов</div>
    <div class="topowrap"><svg width="${W}" height="${H}" style="display:block">${lines}${nodes}</svg></div>
    <div class="btnrow"><button class="btn ghost" id="tp_close">Закрыть</button></div>`);
  document.getElementById('tp_close').onclick=closeSheet;
  document.querySelectorAll('.toponode').forEach(el=>el.onclick=()=>{const id=el.dataset.id;closeSheet();setTimeout(()=>openDevice(id),150);});}

function nfcSupported(){return typeof NDEFReader!=='undefined';}
async function writeNFC(d,n){if(!nfcSupported()){toast('NFC доступен только на Android (Chrome)');return;}
  try{const w=new NDEFReader();await w.write({records:[{recordType:'text',data:`#PM:${d.id}:${n}#`}]});toast('Поднеси метку… записано ✓');}
  catch(e){toast('NFC: '+(e.message||'отменено'));}}
async function scanNFC(){const err=document.getElementById('scan_err');
  if(!nfcSupported()){if(err)err.textContent='NFC доступен только на Android';return;}
  try{const r=new NDEFReader();await r.scan();if(err)err.textContent='Поднеси телефон к NFC-метке…';
    r.onreading=(e)=>{for(const rec of e.message.records){if(rec.recordType==='text'){
      const dec=new TextDecoder(rec.encoding||'utf-8');onScan(dec.decode(rec.data));return;}}};}
  catch(e){if(err)err.textContent='NFC недоступен или запрещён';}}

/* ===== AI-диагностика (только по данным этой сети) ===== */
function aiContext(){
  let s='ОБЪЕКТЫ И ПОРТЫ:\n';
  DB.devices.forEach(d=>{s+=`[${d.name}] тип=${d.type==='panel'?'патч-панель':'свитч'}`;
    if(d.model)s+=`, модель=${d.model}`;if(d.location)s+=`, локация=${d.location}`;s+=`, портов=${d.portCount}\n`;
    for(let n=1;n<=d.portCount;n++){const p=d.ports[n];if(!p)continue;
      const st=p.status||'free';if(st==='free'&&!p.device&&!p.link)continue;
      s+=`  ${d.sfpFrom&&n>=d.sfpFrom?'SFP-порт '+(n-d.sfpFrom+1):'порт '+n}: ${STATLBL[st]}`;
      if(p.mode==='trunk')s+=' [TRUNK/аплинк]';
      if(p.device)s+=`, устройство=${p.device}`;if(p.vlan)s+=`, VLAN=${p.vlan}`;
      if(p.cableId)s+=`, кабель=${p.cableId}`;if(p.location)s+=`, где=${p.location}`;
      if(p.link){const o=devById(p.link.deviceId);if(o)s+=`, связь→[${o.name}:${p.link.port}]`;}
      s+='\n';}});
  let faults='';
  DB.devices.forEach(d=>{for(let n=1;n<=d.portCount;n++){const p=d.ports[n];
    if(p&&p.status==='fault'){const r=p.link?impactFrom([{devId:p.link.deviceId,port:p.link.port}],d.id):{devices:[],leaves:[]};
      const names=r.leaves.map(x=>x.name).slice(0,12).join(', ');
      faults+=`- ${d.name}:${n}${p.device?' ('+p.device+')':''} → при падении отвалится: ${names||'напрямую подключённое'}\n`;}}});
  if(faults)s+='\nАВАРИЙНЫЕ ПОРТЫ (fault) И ПОСЛЕДСТВИЯ ПО ТОПОЛОГИИ:\n'+faults;
  return s.trim();
}
async function callAI(question){
  const sys='Ты — сетевой инженер-диагност внутри приложения PortMap. Тебе дают документацию конкретной сети: '+
    'объекты (свитчи/патч-панели), порты, статусы (активен/резерв/авария/свободен), VLAN, кабели, локации и связи между портами. '+
    'Отвечай СТРОГО на основе этих данных. Не выдумывай устройства, порты или связи, которых нет. '+
    'Если данных не хватает для вывода — прямо скажи об этом. Отвечай кратко, по делу, на русском. '+
    'Для аварий: назови вероятную причину и что отвалится вниз по топологии.';
  const body={model:AI.model,max_tokens:1024,system:sys,
    messages:[{role:'user',content:'ДАННЫЕ СЕТИ:\n'+aiContext()+'\n\nВОПРОС: '+question}]};
  const url=AI.proxyUrl||'https://api.anthropic.com/v1/messages';
  const headers={'Content-Type':'application/json'};
  if(!AI.proxyUrl&&AI.apiKey){headers['x-api-key']=AI.apiKey;headers['anthropic-version']='2023-06-01';
    headers['anthropic-dangerous-direct-browser-access']='true';}
  const res=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'(пустой ответ)';
}

/* ===== импорт вывода команд свитча ===== */
function ifPort(tok){const seg=String(tok).split('/').pop();const m=seg.match(/(\d+)/);return m?+m[1]:null;}
function parseCLI(text,d){
  let count=0,type='';
  const macRe=/([0-9a-f]{4}\.[0-9a-f]{4}\.[0-9a-f]{4}|(?:[0-9a-f]{2}[:-]){5}[0-9a-f]{2})/i;
  const lines=text.split(/\r?\n/);
  const set=(n,patch)=>{if(n<1||n>d.portCount)return;
    const old=d.ports[n],merged=Object.assign({status:'up'},old||{},patch);
    if(!old||old.status!==merged.status)merged.ts=Date.now();
    d.ports[n]=merged;count++;};
  if(/device id|local intrfce/i.test(text)){type='CDP-соседи';
    lines.forEach(l=>{const m=l.match(/^\s*(\S+)\s+([A-Za-z]{2,3}\s?\d[\d\/]*)/);
      if(m){const n=ifPort(m[2].replace(/\s/,''));if(n)set(n,{status:'up',mode:'trunk',device:m[1]});}});}
  else if(/connected|notconnect|err-disabled|disabled/i.test(text)){type='interface status';
    lines.forEach(l=>{const m=l.match(/^\s*(\S+)\s+(.*?)\s+(connected|notconnect|disabled|err-disabled)\s+(\S+)/i);
      if(m){const n=ifPort(m[1]);if(!n)return;const st=/connected/i.test(m[3])?'up':(/disabled/i.test(m[3])?'reserved':'free');
        const patch={status:st};const desc=m[2].trim();if(desc&&desc!=='--')patch.device=desc;
        if(/trunk/i.test(m[4]))patch.mode='trunk';else if(/^\d+$/.test(m[4]))patch.vlan=m[4];set(n,patch);}});}
  else if(macRe.test(text)){type='mac address-table';
    lines.forEach(l=>{const mm=l.match(macRe);if(!mm)return;
      const ifm=l.match(/([A-Za-z]{2,}[\d\/]+)\s*$/);if(!ifm)return;const n=ifPort(ifm[1]);if(!n)return;
      const vl=l.match(/^\s*(\d{1,4})\b/);const patch={status:'up'};if(vl)patch.vlan=vl[1];
      if(!(d.ports[n]&&d.ports[n].device))patch.note=(d.ports[n]&&d.ports[n].note?d.ports[n].note+'; ':'')+'MAC '+mm[1];
      set(n,patch);});}
  else return{type:'',count:0};
  save();return{type,count};
}

  openSheet(`<h2>Импорт из вывода команды</h2>
    <div class="hint">Вставь вывод свитча — заполню порты «${esc(d.name)}» автоматически</div>
    <div class="field"><textarea id="cli_in" placeholder="show mac address-table\nshow interface status\nshow cdp neighbors" style="min-height:150px;font-family:'IBM Plex Mono',monospace;font-size:12px"></textarea></div>

/* ============ CSV (Excel) ============ */
function csvCell(v){v=String(v??'');return /[",\n;]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCSV(devices){
  const head=['Свитч','Модель','Локация_свитча','Порт','Статус','Устройство','VLAN','Кабель_ID','Локация','Заметка','Режим'];
  const rows=[head.join(';')];
  devices.forEach(d=>{for(let n=1;n<=d.portCount;n++){const p=d.ports[n]||{};
    if((p.status||'free')==='free'&&!p.device&&!p.vlan&&!p.cableId&&!p.location&&!p.note)continue;
    rows.push([d.name,d.model||'',d.location||'',n,STATLBL[p.status||'free'],p.device||'',p.vlan||'',p.cableId||'',p.location||'',p.note||'',p.mode==='trunk'?'trunk':'access'].map(csvCell).join(';'));}});
  const blob=new Blob(['\ufeff'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='portmap.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('CSV выгружен');}
function parseCSVLine(line){const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(q){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===';'||c===',')(out.push(cur),cur='');else cur+=c;}}
  out.push(cur);return out;}
function importCSV(text){
  const RSTAT={'активен':'up','резерв':'reserved','авария':'fault','свободен':'free'};
  const lines=text.replace(/^\ufeff/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return 0;lines.shift();
  const map={};
  lines.forEach(l=>{const c=parseCSVLine(l);
    const sw=c[0]?.trim();if(!sw)return;const n=parseInt(c[3]);if(!n)return;
    if(!map[sw]){let d=DB.devices.find(x=>x.name===sw);
      if(!d){d={id:uid(),name:sw,model:c[1]||'',location:c[2]||'',portCount:Math.max(24,n),ports:{}};DB.devices.push(d);}
      map[sw]=d;}
    const d=map[sw];if(n>d.portCount)d.portCount=n<=48?48:n;
    const port={status:RSTAT[(c[4]||'').trim().toLowerCase()]||'up',device:c[5]||'',vlan:c[6]||'',cableId:c[7]||'',location:c[8]||'',note:c[9]||''};
    if((c[10]||'').trim().toLowerCase()==='trunk')port.mode='trunk';d.ports[n]=port;});
  save();return Object.keys(map).length;}

/* ---------- аудит сети ---------- */
function runAudit(){
  const r={dup:[],mode:[],vlan:[],fault:[],stale:[]},byCable={},STALE=30*24*3600*1000;
  DB.devices.forEach(d=>{for(let n=1;n<=d.portCount;n++){const p=d.ports[n];if(!p)continue;
    if(p.cableId){const k=String(p.cableId).trim().toLowerCase();
      if(k)(byCable[k]=byCable[k]||[]).push({d,n,id:p.cableId});}
    if(p.status==='fault')r.fault.push({d,n,text:`${d.name}:${n}`+(p.device?' · '+p.device:'')});
    if(p.status==='reserved'&&p.ts&&Date.now()-p.ts>STALE)
      r.stale.push({d,n,text:`${d.name}:${n} — в резерве ${Math.floor((Date.now()-p.ts)/86400000)} дн.`+(p.device?' · '+p.device:'')});
    const lk=p.link;if(!lk)continue;
    const o=devById(lk.deviceId),q=o&&o.ports[lk.port];
    const once=o&&q&&(d.id<o.id||(d.id===o.id&&n<lk.port)); /* каждую пару линка проверяем один раз */
    if(!once)continue;
    if(d.type!=='panel'&&o.type!=='panel'){
      const am=p.mode==='trunk',bm=q.mode==='trunk';
      if(am!==bm)r.mode.push({d,n,text:`${d.name}:${n} (${am?'trunk':'access'}) ↔ ${o.name}:${lk.port} (${bm?'trunk':'access'})`});
      else if(!am&&p.vlan&&q.vlan&&String(p.vlan).trim()!==String(q.vlan).trim())
        r.vlan.push({d,n,text:`${d.name}:${n} VLAN ${p.vlan} ↔ ${o.name}:${lk.port} VLAN ${q.vlan}`});
    }}});
  Object.values(byCable).forEach(arr=>{if(arr.length>1)
    r.dup.push({d:arr[0].d,n:arr[0].n,text:`«${arr[0].id}»: `+arr.map(x=>`${x.d.name}:${x.n}`).join(', ')});});
  return r;}
function showAudit(){
  const r=runAudit(),total=r.dup.length+r.mode.length+r.vlan.length+r.fault.length+r.stale.length;

    ${sec('Дубликаты кабель-ID',r.dup,'var(--fault)')}

/* ---------- сверка с реальностью (агент / ручной JSON) ---------- */
function parseReality(txt){
  /* принимает: {"ports":{"1":"up",...}} | {"1":"up"} | {"ports":{"1":{"oper":"up","desc":".."}}} */
  const data=JSON.parse(txt);const src=data.ports||data;const map={};
  Object.keys(src).forEach(k=>{const n=parseInt(k);if(!n)return;
    let v=src[k];if(v&&typeof v==='object')v=v.oper||v.status;
    v=String(v||'').toLowerCase();
    if(v==='up'||v==='1'||v==='connected')map[n]='up';
    else if(v==='down'||v==='2'||v==='notconnect'||v==='lowerlayerdown')map[n]='down';});
  return map;}
function realityDiff(d,map){
  const ghosts=[],dead=[];
  Object.keys(map).forEach(k=>{const n=+k;if(n<1||n>d.portCount)return;
    const p=d.ports[n],doc=(p&&p.status)||'free';
    if(map[n]==='up'&&(doc==='free'||doc==='reserved'))
      ghosts.push({n,doc,text:`Порт ${n}: линк поднят, но задокументирован как «${STATLBL[doc]}»`});
    if(map[n]==='down'&&doc==='up')
      dead.push({n,doc,text:`Порт ${n}: задокументирован активным, но линка нет`+(p.device?' · '+p.device:'')});});
  return{ghosts,dead};}
function openRealityCheck(d){
  openSheet(`<h2>${I.bolt} Сверка с реальностью</h2>
    <div class="hint">Вставь JSON от агента (portmap-agent.py) или свой:<br>
      <span class="mono" style="font-size:11px">{"ports":{"1":"up","2":"down"}}</span></div>
    <div class="field"><textarea id="rc_in" placeholder='{"ports":{"1":"up","2":"down","3":"up"}}'
      style="min-height:120px;font-family:'IBM Plex Mono',monospace;font-size:12px"></textarea></div>
    <div class="btnrow"><button class="btn ghost" id="rc_cancel">Отмена</button>
      <button class="btn prim" id="rc_go">Сверить</button></div>
    <div id="rc_out" style="margin-top:14px"></div>`);
  document.getElementById('rc_cancel').onclick=closeSheet;
  document.getElementById('rc_go').onclick=()=>{
    let map;try{map=parseReality(val('rc_in'));}catch(e){toast('Не получилось разобрать JSON');return;}
    const n=Object.keys(map).length;if(!n){toast('В JSON нет портов');return;}
    const{ghosts,dead}=realityDiff(d,map),out=document.getElementById('rc_out');
    if(!ghosts.length&&!dead.length){
      out.innerHTML=`<div class="hint" style="color:var(--up);font-weight:600">✓ Расхождений нет — документация совпадает с реальностью (проверено портов: ${n})</div>`;return;}
    out.innerHTML=
      (ghosts.length?`<div class="hint" style="font-weight:600;color:var(--fault)">Недокументированные линки · ${ghosts.length}</div>`+
        ghosts.map(g=>`<div class="impitem"><span class="id"></span><div>${esc(g.text)}</div></div>`).join(''):'')+
      (dead.length?`<div class="hint" style="font-weight:600;color:var(--reserved);margin-top:10px">Мёртвые «активные» порты · ${dead.length}</div>`+
        dead.map(g=>`<div class="impitem"><span class="id" style="background:var(--reserved)"></span><div>${esc(g.text)}</div></div>`).join(''):'')+
      `<div class="btnrow" style="margin-top:12px">
        <button class="btn prim" id="rc_apply" style="flex:1">Применить: линки → активен, мёртвые → авария</button></div>`;
    document.getElementById('rc_apply').onclick=()=>{
      ghosts.forEach(g=>{const p=d.ports[g.n]||(d.ports[g.n]={});
        p.status='up';p.ts=Date.now();portHist(p,'Сверка: обнаружен линк — статус → Активен');});
      dead.forEach(g=>{const p=d.ports[g.n];if(!p)return;
        p.status='fault';p.ts=Date.now();portHist(p,'Сверка: линка нет — статус → Авария');});
      logEvent(`Сверка «${d.name}»: применено ${ghosts.length+dead.length} исправлений`);
      save();closeSheet();renderDevice();toast(`Применено: ${ghosts.length+dead.length}`);};};}

/* ---------- вид стойки ---------- */
let rackPlace=null; /* {devId} — устройство в режиме размещения */
function showRack(){
  if(!DB.devices.length){toast('Нет объектов');return;}
  rackPlace=null;renderRack();}
function renderRack(){
  const groups={};
  DB.devices.forEach(d=>{const k=d.cabinet&&d.cabinet.trim()||'Без стойки';(groups[k]=groups[k]||[]).push(d);});
  const html=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'ru')).map(cab=>{
    const devs=groups[cab];
    const placed={},unplaced=[];
    devs.forEach(d=>{if(d.unit>=1)placed[d.unit]=d;else unplaced.push(d);});
    const maxU=Math.max(12,...devs.map(d=>d.unit||0));
    let rows='';
    for(let u=maxU;u>=1;u--){const d=placed[u];
      rows+=`<div class="racku${rackPlace?' place':''}" data-u="${u}" data-cab="${esc(cab)}"><div class="un">${u}</div>
        <div class="uslot">${d?
          `<div class="rackdev" data-d="${d.id}">${d.type==='panel'?I.label:I.logo}
             <span class="rd-nm">${esc(d.name)}</span>
             <span class="rd-x" data-x="${d.id}" title="Убрать из юнита">×</span></div>`:
          `<span class="rackfree">${rackPlace?'тап — разместить сюда':''}</span>`}</div></div>`;}
    const chips=unplaced.length?`<div style="padding:9px 12px;border-bottom:1px solid var(--line)">
      <div class="hint" style="margin-bottom:7px;font-size:12px">Не размещены — тапни и укажи юнит:</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">${unplaced.map(d=>
        `<button class="chip rk-chip${rackPlace===d.id?' sel':''}" data-d="${d.id}" style="${rackPlace===d.id?'border-color:var(--brand);color:var(--brand)':''}">${esc(d.name)}</button>`).join('')}</div></div>`:'';
    return `<div class="rackbox"><div class="rackhead">${I.mapg} ${esc(cab)}
      <span style="margin-left:auto;color:var(--muted);font-size:11px;font-weight:400">${devs.length} об.</span></div>${chips}${rows}</div>`;}).join('');
  openSheet(`<h2>${I.mapg} Стойки</h2>
    <div class="hint">Раскладка по юнитам. Шкаф берётся из поля «Шкаф / стойка» объекта.</div>
    ${html}<div class="btnrow" style="margin-top:12px"><button class="btn ghost" id="rk_close">Закрыть</button></div>`);
  document.getElementById('rk_close').onclick=()=>{rackPlace=null;closeSheet();};
  document.querySelectorAll('.rk-chip').forEach(el=>el.onclick=()=>{
    rackPlace=rackPlace===el.dataset.d?null:el.dataset.d;renderRack();});
  document.querySelectorAll('.rackdev').forEach(el=>el.onclick=e=>{
    if(e.target.dataset.x){const d=devById(e.target.dataset.x);if(d){delete d.unit;save();renderRack();}return;}
    const d=devById(el.dataset.d);if(d){rackPlace=null;closeSheet();openDevice(d.id);}});
  document.querySelectorAll('.racku').forEach(el=>el.querySelector('.uslot').onclick=e=>{
    if(!rackPlace)return;
    if(e.target.closest('.rackdev'))return; /* занято */
    const d=devById(rackPlace);if(!d)return;
    d.unit=+el.dataset.u;d.cabinet=d.cabinet&&d.cabinet.trim()?d.cabinet:(el.dataset.cab==='Без стойки'?'':el.dataset.cab);
    logEvent(`${d.name} размещён: ${d.cabinet||'стойка'} · U${d.unit}`);
    save();rackPlace=null;renderRack();});}

/* ============ start ============ */
applyTheme();
boot();
/* если localStorage пуст/битый — поднимаем данные из IndexedDB и перерисовываем */
loadIDB().then(changed=>{if(changed){applyTheme();boot();}});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{const w=reg.installing;
      if(w)w.addEventListener('statechange',()=>{
        if(w.state==='installed'&&navigator.serviceWorker.controller)
          toast('Доступно обновление — перезапусти приложение');});});
  }).catch(()=>{});});}
</script>
