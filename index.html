  document.querySelectorAll('.nm-node').forEach(el=>el.onclick=()=>{closeSheet();openDevice(el.dataset.d);});}

/* ---------- 📡 веб-пинг (без агента) ----------
   Браузер не умеет ICMP; меряем достижимость через fetch.
   «Отвечает» — надёжный сигнал. «Нет ответа» — не приговор:
   HTTPS-страница может блокировать HTTP в локальную сеть. */
function webPing(ip){return new Promise(res=>{
  const now=()=> (window.performance&&performance.now)?performance.now():Date.now();
  const t0=now();
  const ctl=('AbortController' in window)?new AbortController():null;
  let settled=false;
  const done=st=>{if(settled)return;settled=true;res({st,ms:Math.round(now()-t0)});};
  const tm=setTimeout(()=>{if(ctl)ctl.abort();done('dead');},2500);
  try{
    fetch('http://'+ip+'/',{mode:'no-cors',cache:'no-store',signal:ctl&&ctl.signal})
      .then(()=>{clearTimeout(tm);done('ok');})
      .catch(()=>{clearTimeout(tm);done('unknown');});
  }catch(e){clearTimeout(tm);done('unknown');}});}

function pingDot(st){const col=st==='ok'?'var(--up)':st==='dead'?'var(--fault)':'var(--reserved)';
  return `<span class="pingdot" style="background:${col}"></span>`;}

function showPingAll(d){
  const targets=[];
  if(d.mgmtIp)targets.push({label:d.name+' (mgmt)',ip:d.mgmtIp});
  Object.entries(d.ports||{}).forEach(([n,p])=>{if(p&&p.ip)targets.push({label:t('port')+' '+n+(p.device?' · '+p.device:''),ip:p.ip});});
  if(!targets.length){toast(t('ping_none'));return;}
  openSheet(`<h2>📡 ${t('ping_all')}</h2><div class="hint">${esc(d.name)} · ${targets.length}</div>
    <div id="pg_list">${targets.map((x,i)=>
      `<div class="impitem"><div style="flex:1"><div id="pg_s${i}">${pingDot('wait')}${esc(x.label)}</div>
        <div style="font-size:11px;color:var(--muted)" class="mono">${esc(x.ip)}</div></div>
        <span class="im-sub" id="pg_ms${i}">…</span></div>`).join('')}</div>
    <div class="hint" style="margin-top:10px">${t('ping_hint')}</div>
    <div class="btnrow" style="margin-top:10px"><button class="btn ghost" id="pg_close">${t('close')}</button></div>`);
  document.getElementById('pg_close').onclick=closeSheet;
  targets.forEach((x,i)=>{webPing(x.ip).then(r=>{
    const s=document.getElementById('pg_s'+i),m=document.getElementById('pg_ms'+i);
    if(!s||!m)return;
    s.innerHTML=pingDot(r.st)+esc(x.label);
    m.textContent=r.st==='ok'?(r.ms+' ms'):r.st==='dead'?t('ping_dead'):t('ping_unknown');});});}

/* ============================================================
   PRO+ v2 : undo, свободные порты, экспорт аудита, сверка по URL,
   режим монтажника, чек-лист, сводка, заметки объекта, NetBox,
   паспорт стойки, корзина, шифрованный экспорт, статистика
   ============================================================ */

/* ---------- тост с действием ---------- */
function toastAct(msg,label,fn){const el=document.getElementById('toast');
  el.textContent='';const s=document.createElement('span');s.textContent=msg;el.appendChild(s);
  const b=document.createElement('button');b.textContent=label;
  b.style.cssText='margin-left:10px;background:var(--brand);color:#1a1205;border:none;border-radius:7px;padding:5px 11px;font-weight:700;font-size:12px';
  el.appendChild(b);el.classList.add('on');clearTimeout(el._t);
  b.onclick=()=>{el.classList.remove('on');fn();};
  el._t=setTimeout(()=>el.classList.remove('on'),6000);}

/* ---------- undo (один шаг) ---------- */
let UNDO=null;
function snapUndo(d,n){UNDO={devId:d.id,n,port:d.ports[n]?JSON.parse(JSON.stringify(d.ports[n])):null};}
function undoLast(){if(roGuard())return;if(!UNDO)return;const d=devById(UNDO.devId);if(!d){UNDO=null;return;}
  const n=UNDO.n;
  if(d.ports[n]&&d.ports[n].link)removeReverse(d,n);
  if(UNDO.port){d.ports[n]=UNDO.port;
    if(UNDO.port.link){const o=devById(UNDO.port.link.deviceId);
      if(o){o.ports[UNDO.port.link.port]=o.ports[UNDO.port.link.port]||{status:'up'};
        o.ports[UNDO.port.link.port].link={deviceId:d.id,port:n};}}}
  else delete d.ports[n];
  logEvent(`${t('undone')}: ${d.name}:${n}`);UNDO=null;save();
  if(view.deviceId===d.id)renderDevice();toast(t('undone'));}

/* ---------- подбор свободных портов ---------- */
function showFreePorts(){
  const rows=DB.devices.map(d=>{const free=[];
    for(let n=1;n<=d.portCount;n++){const p=d.ports[n];if(!p||(p.status||'free')==='free')free.push(n);}
    return{d,free};}).filter(x=>x.free.length);
  openSheet(`<h2>${t('free_ports')}</h2><div class="hint">${t('free_hint')}</div>
    <div class="field"><input id="fp_q" placeholder="${t('free_filter')}"></div><div id="fp_out"></div>
    <div class="btnrow"><button class="btn ghost" id="fp_close">${t('close')}</button></div>`);
  const draw=q=>{q=(q||'').toLowerCase();
    document.getElementById('fp_out').innerHTML=rows
      .filter(x=>!q||[x.d.name,x.d.cabinet,x.d.location,x.d.site].some(v=>v&&String(v).toLowerCase().includes(q)))
      .map(x=>`<div class="impitem gsr-i" data-d="${x.d.id}"><span class="id" style="background:var(--free)"></span>
        <div style="min-width:0"><div>${esc(x.d.name)}${x.d.cabinet?' · '+esc(x.d.cabinet):''}</div>
        <div style="font-size:11px;color:var(--muted)">${t('free_lbl')}: ${x.free.slice(0,14).join(', ')}${x.free.length>14?'…':''}</div></div>
        <span class="im-sub">${x.free.length}</span></div>`).join('')||`<div class="hint">${t('nothing')}</div>`;
    document.querySelectorAll('#fp_out .gsr-i').forEach(el=>el.onclick=()=>{closeSheet();openDevice(el.dataset.d);});};
  draw('');document.getElementById('fp_q').oninput=e=>draw(e.target.value);
  document.getElementById('fp_close').onclick=closeSheet;}

/* ---------- сводка за период ---------- */
function showShift(){let span=864e5;
  const draw=()=>{const from=Date.now()-span,items=(DB.log||[]).filter(e=>e.ts>=from);
    document.getElementById('sh_out').innerHTML=items.length?items.map(e=>
      `<div class="impitem"><div><div>${esc(e.text)}</div>
       <div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(e.user)} · ${relTime(e.ts)}</div></div></div>`).join('')
      :`<div class="hint">${t('nothing')}</div>`;
    document.getElementById('sh_n').textContent=items.length;};
  openSheet(`<h2>${t('shift')}</h2><div class="hint">${t('shift_hint')} · <b id="sh_n">0</b></div>
    <div class="seg" id="sh_seg" style="margin-bottom:10px">
      <button data-s="${864e5}" class="sel">24${t('h_short')}</button>
      <button data-s="${7*864e5}">7${t('d_short')}</button>
      <button data-s="${30*864e5}">30${t('d_short')}</button></div>
    <div id="sh_out"></div>
    <div class="btnrow" style="margin-top:12px"><button class="btn ghost" id="sh_close">${t('close')}</button>
      <button class="btn prim" id="sh_print">${t('print')}</button></div>`);
  document.querySelectorAll('#sh_seg button').forEach(b=>b.onclick=()=>{span=+b.dataset.s;
    document.querySelectorAll('#sh_seg button').forEach(x=>x.classList.toggle('sel',x===b));draw();});
  draw();
  document.getElementById('sh_close').onclick=closeSheet;
  document.getElementById('sh_print').onclick=()=>{const from=Date.now()-span;
    const items=(DB.log||[]).filter(e=>e.ts>=from);
    printHTML(`<div class="rpt"><div class="rh"><h1>${t('shift')}</h1>
      <div class="rsub">${new Date(from).toLocaleString()} — ${new Date().toLocaleString()}</div></div>
      <table class="rt"><thead><tr><th>${t('when')}</th><th>${t('who')}</th><th>${t('what')}</th></tr></thead><tbody>
      ${items.map(e=>`<tr><td class="pn">${new Date(e.ts).toLocaleString()}</td><td>${esc(e.user)}</td><td>${esc(e.text)}</td></tr>`).join('')}
      </tbody></table><div class="rf">PortMap Pro</div></div>`);};}

/* ---------- заметки объекта ---------- */
function showDevNotes(d){
  const draw=()=>document.getElementById('dn_list').innerHTML=(d.notes||[]).map((e,i)=>
    `<div class="impitem"><div style="flex:1"><div>${esc(e.text)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(e.user)} · ${relTime(e.ts)}</div></div>
      <button class="rd-x dn-del" data-i="${i}" style="background:none;border:none;color:var(--muted);font-size:16px">×</button></div>`).join('')
    ||`<div class="hint">${t('nothing')}</div>`;
  openSheet(`<h2>${t('obj_notes')}</h2><div class="hint">${esc(d.name)}</div>
    <div class="field"><textarea id="dn_in" placeholder="${t('note_ph')}" style="min-height:60px"></textarea></div>
    <div class="btnrow"><button class="btn prim" id="dn_add" style="flex:1">${t('add')}</button></div>
    <div id="dn_list" style="margin-top:12px"></div>
    <div class="btnrow" style="margin-top:12px"><button class="btn ghost" id="dn_close">${t('close')}</button></div>`);
  const bind=()=>document.querySelectorAll('.dn-del').forEach(b=>b.onclick=()=>{
    d.notes.splice(+b.dataset.i,1);save();draw();bind();});
  draw();bind();
  document.getElementById('dn_close').onclick=closeSheet;
  document.getElementById('dn_add').onclick=()=>{if(roGuard())return;const v=val('dn_in');if(!v)return;
    d.notes=d.notes||[];d.notes.unshift({ts:Date.now(),user:(DB.account&&DB.account.name)||'—',text:v});
    if(d.notes.length>50)d.notes.length=50;
    logEvent(`${d.name}: ${t('note_added')}`);save();
    document.getElementById('dn_in').value='';draw();bind();};}

/* ---------- чек-лист приёмки ---------- */
const CHK_KEYS=['chk_fw','chk_vlan','chk_snmp','chk_uplink','chk_qr','chk_cfg'];
function showChecklist(d){d.check=d.check||{};
  const draw=()=>{document.getElementById('ck_list').innerHTML=CHK_KEYS.map(k=>
    `<div class="menu-item ck-i" data-k="${k}" style="${d.check[k]?'color:var(--up)':''}">
      ${d.check[k]?'☑':'☐'} ${t(k)}</div>`).join('');
    const done=CHK_KEYS.filter(k=>d.check[k]).length;
    document.getElementById('ck_p').textContent=done+'/'+CHK_KEYS.length;
    document.querySelectorAll('.ck-i').forEach(el=>el.onclick=()=>{
      if(roGuard())return;
      d.check[el.dataset.k]=!d.check[el.dataset.k];save();draw();});};
  openSheet(`<h2>${t('checklist')}</h2><div class="hint">${esc(d.name)} · <b id="ck_p"></b></div>
    <div id="ck_list"></div>
    <div class="btnrow" style="margin-top:12px"><button class="btn ghost" id="ck_close">${t('close')}</button></div>`);
  draw();document.getElementById('ck_close').onclick=closeSheet;}

/* ---------- NetBox CSV ---------- */
function exportNetbox(){
  const dl=(name,rows)=>{const blob=new Blob(['\ufeff'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);};
  const devRows=['name,device_role,manufacturer,model,site,rack,position,status'];
  DB.devices.forEach(d=>devRows.push([d.name,d.type==='panel'?'patch-panel':'access-switch',
    (d.model||'').split(' ')[0]||'','"'+(d.model||'')+'"',d.site||'',d.cabinet||'',d.unit||'','active']
    .map(v=>String(v).includes(',')?'"'+v+'"':v).join(',')));
  const ifRows=['device,name,type,enabled,description'];
  DB.devices.forEach(d=>{for(let n=1;n<=d.portCount;n++){const p=d.ports[n]||{};
    const desc=[p.device,p.ip,p.mac,p.vlan&&'VLAN '+p.vlan,p.cableId&&'cable '+p.cableId].filter(Boolean).join(' | ');
    ifRows.push([d.name,(d.sfpFrom&&n>=d.sfpFrom?'sfp':'eth')+n,
      d.sfpFrom&&n>=d.sfpFrom?'1000base-x-sfp':'1000base-t',
      (p.status||'free')!=='free','"'+desc.replace(/"/g,"'")+'"'].join(','));}});
  dl('netbox-devices.csv',devRows);setTimeout(()=>dl('netbox-interfaces.csv',ifRows),400);
  toast(t('nb_done'));}

/* ---------- паспорт стойки (печать) ---------- */
function printRackPassport(){
  const groups={};
  DB.devices.forEach(d=>{const k=d.cabinet&&d.cabinet.trim();if(k)(groups[k]=groups[k]||[]).push(d);});
  const cabs=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'ru'));
  if(!cabs.length){toast(t('rk_nocab'));return;}
  const html=cabs.map(cab=>{const devs=groups[cab].slice().sort((a,b)=>(b.unit||0)-(a.unit||0));
    return `<div class="rpt" style="page-break-after:always"><div class="rh"><h1>${esc(cab)}</h1>
      <div class="rsub">${t('rk_passport')} · ${new Date().toLocaleDateString()}</div></div>
      <table class="rt"><thead><tr><th>U</th><th>${t('object')}</th><th>${t('model')}</th><th>IP</th><th>QR</th></tr></thead><tbody>
      ${devs.map(d=>`<tr><td class="pn">${d.unit||'—'}</td><td><b>${esc(d.name)}</b></td>
        <td>${esc(d.model||'')}</td><td class="pn">${esc(d.mgmtIp||'')}</td>
        <td><div id="rq-${d.id}" style="width:64px;height:64px"></div></td></tr>`).join('')}
      </tbody></table><div class="rf">PortMap Pro · ${t('rk_passport')}</div></div>`;}).join('');
  printHTML(html);
  setTimeout(()=>{cabs.forEach(cab=>groups[cab].forEach(d=>{
    const el=document.getElementById('rq-'+d.id);if(!el)return;el.innerHTML='';
    new QRCode(el,{text:`#PMD:${d.id}# PortMap объект | ${d.name}`,width:64,height:64,correctLevel:QRCode.CorrectLevel.M});}));},60);}

/* ---------- корзина (30 дней, IndexedDB) ---------- */
async function trashPush(d){try{const r=await IDB.get('portmap_trash');
  const list=r?JSON.parse(r):[];list.unshift({ts:Date.now(),device:d});
  await IDB.set('portmap_trash',JSON.stringify(list.slice(0,50)));}catch(e){}}
async function trashPurge(){try{const r=await IDB.get('portmap_trash');if(!r)return;
  const list=JSON.parse(r).filter(x=>Date.now()-x.ts<30*864e5);
  await IDB.set('portmap_trash',JSON.stringify(list));}catch(e){}}
async function showTrash(){
  let list=[];
  try{const r=await IDB.get('portmap_trash');list=r?JSON.parse(r):[];}
  catch(e){console.error('trash:',e);toast(t('trash_err'));return;}
  {
    openSheet(`<h2>${I.trash} ${t('trash')}</h2><div class="hint">${t('trash_hint')}</div>
      <div id="tr_list">${list.length?list.map((x,i)=>
        `<div class="impitem"><div style="flex:1"><div>${esc(x.device.name)}</div>
          <div style="font-size:11px;color:var(--muted)">${esc(x.device.model||'')} · ${relTime(x.ts)}</div></div>
          <button class="btn ghost tr-res" data-i="${i}" style="padding:6px 12px;font-size:12px">${t('restore')}</button></div>`).join('')
        :`<div class="hint">${t('trash_empty')}</div>`}</div>
      <div class="btnrow" style="margin-top:12px"><button class="btn ghost" id="tr_close">${t('close')}</button></div>`);
    document.getElementById('tr_close').onclick=closeSheet;
    document.querySelectorAll('.tr-res').forEach(b=>b.onclick=()=>{
      if(roGuard())return;
      const x=list[+b.dataset.i];if(!x)return;
      const d=x.device;if(DB.devices.some(v=>v.id===d.id))d.id=uid();
      /* ссылки на другие объекты могли протухнуть — чистим битые */
      Object.values(d.ports||{}).forEach(p=>{if(p.link&&!devById(p.link.deviceId))delete p.link;});
      DB.devices.push(d);list.splice(+b.dataset.i,1);
      IDB.set('portmap_trash',JSON.stringify(list)).catch(()=>{});
      logEvent(`${t('restored')}: ${d.name}`);save();closeSheet();renderHome();toast(t('restored'));});
  }}

/* ---------- шифрованный экспорт / импорт (AES-GCM + PBKDF2) ---------- */
function b64e(u8){let s='';for(let i=0;i<u8.length;i+=0x8000)s+=String.fromCharCode.apply(null,u8.subarray(i,i+0x8000));return btoa(s);}
function b64d(s){const bin=atob(s),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function cryptoKey(pass,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,
    {name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function exportEncrypted(){
  const pass=prompt(t('enc_ask'));if(!pass)return;
  try{
    const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));
    const key=await cryptoKey(pass,salt);
    const payload=new TextEncoder().encode(JSON.stringify({devices:DB.devices,log:DB.log||[]}));
    const ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,payload));
    const doc={app:'PortMap',enc:1,v:1,salt:b64e(salt),iv:b64e(iv),data:b64e(ct)};
    const blob=new Blob([JSON.stringify(doc)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='portmap-encrypted.json';a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    DB.lastBackup=Date.now();DB.chg=0;save();toast(t('enc_done'));
  }catch(e){toast(t('enc_err'));}}
async function importEncrypted(doc){
  const pass=prompt(t('enc_ask_dec'));if(!pass)return;
  try{
    const key=await cryptoKey(pass,b64d(doc.salt));
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(doc.iv)},key,b64d(doc.data));
    const data=JSON.parse(new TextDecoder().decode(pt)),list=data.devices||[];
    list.forEach(d=>{if(!d.id||DB.devices.some(v=>v.id===d.id))d.id=uid();if(!d.ports)d.ports={};DB.devices.push(d);});
    save();closeSheet();renderHome();toast(t('imported')+': '+list.length);
  }catch(e){toast(t('enc_badpass'));}}

/* ---------- график заполненности ---------- */
function sparkHTML(){const s=DB.statHist||[];if(s.length<2)return '';
  const w=320,hh=34,max=Math.max(...s.map(x=>x.u),1);
  const pts=s.map((x,i)=>`${(i/(s.length-1)*w).toFixed(1)},${(hh-4-(x.u/max)*(hh-8)).toFixed(1)}`).join(' ');
  return `<div style="margin:8px 2px 0"><svg viewBox="0 0 ${w} ${hh}" style="width:100%;height:${hh}px" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity=".8"/></svg><div style="font-size:10px;color:var(--muted);text-align:right;margin-top:-2px">${t('stat_trend')}</div></div>`;}
